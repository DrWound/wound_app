<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <title>登入系統</title>
  <style>
    body { font-family: "Microsoft JhengHei", sans-serif; margin: 30px; background: #f0f0f0; }
    .container { background: #fff; max-width: 400px; margin: auto; padding: 30px; border-radius: 10px; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
    h2 { text-align: center; color: #2e4a62; }
    input { width: 100%; padding: 10px; margin-top: 10px; }
    button {
      margin-top: 20px;
      padding: 10px;
      width: 100%;
      background: #2e4a62;
      color: white;
      border: none;
      border-radius: 5px;
    }
    .error { color: red; text-align: center; margin-top: 10px; }
    .nav-links {
      display: flex;
      flex-wrap: nowrap;
      overflow-x: auto;
      gap: 10px;
      margin-top: 30px;
      padding: 10px;
      background: #e8e8e8;
      border-radius: 8px;
      justify-content: start;
    }
    .nav-links a {
      white-space: nowrap;
      text-decoration: none;
      color: #2e4a62;
      padding: 8px 12px;
      background: #fff;
      border-radius: 5px;
      box-shadow: 0 0 3px rgba(0,0,0,0.1);
      flex-shrink: 0;
    }
  </style>
</head>
<body>
  <div class="container">
    <h2>醫師登入</h2>
    <form method="POST">
      <input type="text" name="username" placeholder="帳號" required>
      <input type="password" name="password" placeholder="密碼" required>
      <button type="submit">登入</button>
    </form>
    {% if error %}
      <p class="error">{{ error }}</p>
    {% endif %}
    <div class="nav-links">
      <a href="/">⬅ 返回首頁</a>
      <a href="/upload_csv">📄 CSV 批次上傳醫師解說</a>
      <a href="/cases">🔍 瀏覽所有已上傳案例總覽</a>
      <a href="/archive">📦 歷史案例存檔</a>
      <a href="/patient">🙋‍♂️ 病人查詢入口</a>
    </div>
  </div>
</body>
</html>
